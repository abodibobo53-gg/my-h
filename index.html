<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickman: Legends of 2099</title>
    <style>
        body { text-align: center; background-color: #0b0c10; color: #66fcf1; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        h1 { color: #FF4B4B; margin-bottom: 5px; }
        canvas { background: #1f2833; border: 4px solid #45f3ff; border-radius: 12px; display: block; margin: 0 auto; box-shadow: 0 0 20px #45f3ff; }
        .hud { font-size: 22px; color: #45f3ff; margin: 10px; font-weight: bold; text-shadow: 0 0 10px #45f3ff; }
    </style>
</head>
<body>

    <h1>⚔️ Stickman: حرب السكنات الأسطورية ⚔️</h1>
    
    <div class="hud">🛡️ المرحلة: <span id="stage">1</span> | 👾 الأعداء: <span id="enemyCount">3</span></div>
    <canvas id="battleCanvas" width="800" height="350"></canvas>

<script>
    const canvas = document.getElementById('battleCanvas');
    const ctx = canvas.getContext('2d');

    let stage = 1;
    let keys = {};
    let gameOver = false;
    let gameTime = 0;

    let player = { x: 150, y: 270, vx: 0, vy: 0, color: '#45f3ff', isGrounded: false, attacking: false, attackTimer: 0, faceDir: 1 };
    let allies = [{ x: 80, y: 270, vx: 0, vy: 0, color: '#2ecc71', isGrounded: false, attacking: false, attackTimer: 0, faceDir: 1 }];
    let enemies = [];

    function spawnEnemies() {
        enemies = [];
        let count = (stage === 1) ? 3 : 4;
        let type = (stage === 1) ? 'pirate' : 'spider';
        
        for(let i=0; i<count; i++) {
            enemies.push({
                x: 500 + (i * 90),
                y: (type === 'spider') ? 280 : 270,
                hp: (stage === 1) ? 30 : 50,
                maxHp: (stage === 1) ? 30 : 50,
                type: type,
                color: (type === 'pirate') ? '#111111' : '#ff0055',
                vx: 0, vy: 0, faceDir: -1
            });
        }
        document.getElementById('enemyCount').innerText = enemies.length;
    }

    window.addEventListener('keydown', function(e) { keys[e.code] = true; });
    window.addEventListener('keyup', function(e) { keys[e.code] = false; });

    function drawAdvancedSkin(x, y, type, isAttacking, faceDir, color) {
        ctx.lineWidth = 3;

        if (type === 'spider') {
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.arc(x+20, y+15, 15, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#ff0000';
            ctx.fillRect((faceDir > 0 ? x+25 : x+5), y + 10, 5, 5);
            ctx.strokeStyle = '#ff0055';
            for(let i=0; i<4; i++) {
                let legWave = Math.sin((gameTime * 0.1) + i) * 8;
                ctx.beginPath(); ctx.moveTo(x+20, y+15); 
                ctx.lineTo(x - 10 + (i * 20), y + 30 + legWave); ctx.stroke();
            }
            return;
        }

        ctx.strokeStyle = color;
        ctx.beginPath(); ctx.arc(x + 10, y + 10, 8, 0, Math.PI * 2); ctx.stroke();
        
        if (type === 'pirate') {
            ctx.fillStyle = '#000000';
            ctx.beginPath(); ctx.moveTo(x-2, y+4); ctx.lineTo(x+22, y+4); ctx.lineTo(x+10, y-5); ctx.closePath(); ctx.fill();
            ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(x+6, y+8); ctx.lineTo(x+14, y+12); ctx.stroke();
            ctx.strokeStyle = color; ctx.lineWidth = 3;
        }

        if (type === 'ally') {
            ctx.fillStyle = '#f1c40f';
            ctx.beginPath(); ctx.arc(x + 10, y + 8, 9, Math.PI, 0); ctx.fill();
        }

        ctx.beginPath(); ctx.moveTo(x + 10, y + 18); ctx.lineTo(x + 10, y + 35); ctx.stroke();
        
        if (type === 'leader') {
            ctx.fillStyle = '#ff003c';
            let scarfWave = Math.sin(gameTime * 0.15) * 5;
            ctx.beginPath();
            ctx.moveTo(x + 10, y + 18);
            ctx.lineTo(x - (20 * faceDir), y + 22 + scarfWave);
            ctx.lineTo(x - (15 * faceDir), y + 15 + scarfWave);
            ctx.closePath(); ctx.fill();
        }

let handY = y + 25;
        if (isAttacking) {
            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = (type === 'leader') ? '#00efff' : ((type === 'ally') ? '#f1c40f' : '#ff003c');
            ctx.strokeStyle = (type === 'leader') ? '#00efff' : ((type === 'ally') ? '#f1c40f' : '#ff003c');
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(x + 10, handY);
            ctx.lineTo(x + 10 + (35 * faceDir), handY - 15);
            ctx.stroke();
            ctx.restore();
        } else {
            ctx.beginPath(); ctx.moveTo(x, handY); ctx.lineTo(x + 20, handY); ctx.stroke();
            ctx.strokeStyle = (type === 'leader') ? '#00efff' : '#f1c40f';
            ctx.beginPath(); ctx.moveTo(x+10, y+20); ctx.lineTo(x+22, y+5); ctx.stroke();
            ctx.strokeStyle = color;
        }
        
        let legOffset = Math.sin(gameTime * 0.12) * 8;
        ctx.beginPath(); ctx.moveTo(x + 10, y + 35); ctx.lineTo(x + 10 + legOffset, y + 50); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x + 10, y + 35); ctx.lineTo(x + 10 - legOffset, y + 50); ctx.stroke();
    }

    function updatePhysics(char) {
        char.vy += 0.5; char.y += char.vy; char.x += char.vx;
        if (char.y >= 270) { char.y = 270; char.vy = 0; char.isGrounded = true; }
        if (char.x < 0) char.x = 0; if (char.x > 780) char.x = 780;
    }

    function drawHealthBar(char, yOffset) {
        if(char.hp === undefined) return;
        let width = 30;
        let pct = char.hp / char.maxHp;
        ctx.fillStyle = '#333333'; ctx.fillRect(char.x - 5, char.y - yOffset, width, 5);
        ctx.fillStyle = '#ff0055'; ctx.fillRect(char.x - 5, char.y - yOffset, width * pct, 5);
    }

    function loop() {
        gameTime++;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = '#45f3ff'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(0, 320); ctx.lineTo(canvas.width, 320); ctx.stroke();

        player.vx = 0;
        if (keys['ArrowRight']) { player.vx = 4; player.faceDir = 1; }
        if (keys['ArrowLeft']) { player.vx = -4; player.faceDir = -1; }
        if (keys['ArrowUp'] && player.isGrounded) { player.vy = -11; player.isGrounded = false; }
        if (keys['Space'] && !player.attacking) { player.attacking = true; player.attackTimer = 10; }
        
        if (player.attacking) {
            player.attackTimer--;
            if (player.attackTimer <= 0) player.attacking = false;
        }
        updatePhysics(player);
        drawAdvancedSkin(player.x, player.y, 'leader', player.attacking, player.faceDir, player.color);

        allies.forEach(function(ally) {
            let target = (enemies.length > 0) ? enemies[0] : player;
            let dist = target.x - ally.x;
            ally.faceDir = (dist > 0) ? 1 : -1;
            
            if (Math.abs(dist) > 50) {
                ally.vx = Math.sign(dist) * 3.2;
            } else {
                ally.vx = 0;
                if (enemies.length > 0 && !ally.attacking) { ally.attacking = true; ally.attackTimer = 12; }
            }
            
            if (ally.attacking) {
                ally.attackTimer--;
                if (ally.attackTimer <= 0) ally.attacking = false;
            }
            updatePhysics(ally);
            drawAdvancedSkin(ally.x, ally.y, 'ally', ally.attacking, ally.faceDir, ally.color);
        });

        for (let i = enemies.length - 1; i >= 0; i--) {
            let enemy = enemies[i];
            let distToPlayer = player.x - enemy.x;
            enemy.faceDir = (distToPlayer > 0) ? 1 : -1;
            enemy.vx = Math.sign(distToPlayer) * 1.8;
            
            if (player.attacking && Math.abs(player.x - enemy.x) < 55) {
                enemy.hp -= 2; player.attacking = false;
            }
            allies.forEach(function(ally) {
                if (ally.attacking && Math.abs(ally.x - enemy.x) < 55) { enemy.hp -= 1; }
            });

updatePhysics(enemy);
            drawAdvancedSkin(enemy.x, enemy.y, enemy.type, false, enemy.faceDir, enemy.color);
            drawHealthBar(enemy, 15);

            if (enemy.hp <= 0) { enemies.splice(i, 1); }
        }

        document.getElementById('enemyCount').innerText = enemies.length;

        if (enemies.length === 0 && !gameOver) {
            if (stage === 1) {
                stage = 2;
                document.getElementById('stage').innerText = '2';
                spawnEnemies();
            } else {
                ctx.fillStyle = '#00ff88'; ctx.font = 'bold 28px sans-serif';
                ctx.fillText('🎉 WIN 🎉', 320, 170);
                gameOver = true;
            }
        }

        if (!gameOver) requestAnimationFrame(loop);
    }

    stage = 1;
    gameOver = false;
    spawnEnemies();
    loop();
</script>
</body>
</html>
