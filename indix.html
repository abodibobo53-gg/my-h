<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار ذكاء سريع! 🧠</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: #252538;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            width: 85%;
            max-width: 400px;
            position: relative;
        }

        h1 {
            color: #ff007f;
            font-size: 28px;
            margin-bottom: 30px;
            direction: ltr;
        }

        .btn-group {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 100px;
            position: relative;
        }

        button {
            padding: 12px 40px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        #correct-btn {
            background-color: #38ef7d;
            color: white;
        }

        #wrong-btn {
            background-color: #11998e;
            color: white;
            position: absolute;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="question">1 + 1 = 3 ؟</h1>
        
        <div class="btn-group">
            <button id="correct-btn" onclick="sayYes()">3</button>
            <button id="wrong-btn" onmouseover="moveButton()" onclick="moveButton()">2</button>
        </div>
    </div>

    <script>
        function moveButton() {
            const wrongBtn = document.getElementById('wrong-btn');
            const x = Math.random() * (window.innerWidth - wrongBtn.offsetWidth - 20);
            const y = Math.random() * (window.innerHeight - wrongBtn.offsetHeight - 20);
            
            wrongBtn.style.position = 'fixed';
            wrongBtn.style.left = x + 'px';
            wrongBtn.style.top = y + 'px';
        }

        function sayYes() {
            document.getElementById('question').style.direction = 'rtl';
            document.getElementById('question').innerText = "شنت الشاك بيك! 😭😂";
            document.getElementById('correct-btn').style.display = 'none';
            document.getElementById('wrong-btn').style.display = 'none';
        }
    </script>

</body>
</html>
